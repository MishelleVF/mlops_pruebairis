name: CICD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  statuses: write
  id-token: write

jobs:
  ci:
    permissions: write-all
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pre-Commit
        run: |
          pip install pre-commit
          pre-commit --version
          pre-commit install
          pre-commit run --all-files

  cd:
    needs: [ci]
    name: Deploy
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile
        run: |
          pip install -r src/pipelines/requirements.txt
          python -B src/pipelines/iris_pipeline.py

      - name: 'GCP Auth'
        uses: 'google-github-actions/auth@v0.4.0'
        with:
          project_id: 'project-c2c38c0d-53a2-459c-a19'
          workload_identify_provider: 'projects/403635817984/locations/global/workloadIdentityPools/github-mlops-iris/providers/github-mlops-provider'
          service_account: 'mlops-iris-prueba@project-c2c38c0d-53a2-459c-a19.iam.gserviceaccount.com'

      - name: Register
        run: |
          curl -X POST \
          -H "Authorization: Bearer $(gcloud auth print-access-token)" \
          -F tags=latest \
          -F content=@pipeline.yaml \
          https://us-central1-kfp.pkg.dev/project-c2c38c0d-53a2-459c-a19/mlops-iris
